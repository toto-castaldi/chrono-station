databaseChangeLog:
  - changeSet:
      id: 002-seed-workout
      author: chrono
      # riga singleton dell'allenamento, sempre presente (reset = UPDATE, mai DELETE)
      changes:
        - insert:
            tableName: workout
            columns:
              - column: { name: id, valueNumeric: 1 }
              - column: { name: state, value: "onboarding" }
              - column: { name: countdown_secs, valueNumeric: 10 }
      rollback:
        - delete:
            tableName: workout
            where: id = 1

